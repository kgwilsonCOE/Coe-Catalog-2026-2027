# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  #schedule:
  #  - cron: '30 */2 * * *'
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  #pull_request:
  #  branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # Install and setup quarto
      - name: "Setup Quarto"
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true
      
      # Run build scripts before render
      - name: "Run Build scripts"
        run: |
          quarto run variable_replacement.py
          quarto run create_department_page.py
        
     # Render output
      - name: Render Quarto Project
        uses: quarto-dev/quarto-actions/render@v2
        continue-on-error: true 
        with:
          to: all

      # Debug if something goes wrong!
      - name: Show Build Log on Failure
        run: |
          echo "--- Error Log Contents ---"
          cat /home/runner/work/Coe-Catalog-2023-2024/Coe-Catalog-2023-2024/index.log || echo "Build log not found or empty."
          
      # Push changes back to the repo
      - name: Push changes
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: Updated ouput files
